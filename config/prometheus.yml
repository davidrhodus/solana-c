# Prometheus configuration for Solana C Validator
#
# Scrape metrics from the validator and provide basic alerting

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'solana-validator'
    static_configs:
      - targets: ['validator:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'validator'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting rules (basic)
rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
